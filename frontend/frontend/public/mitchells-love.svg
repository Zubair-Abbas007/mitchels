<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 440" width="400" height="440">
  <!-- White background -->
  <rect width="400" height="440" fill="white"/>

  <!-- Mitchell's badge at top -->
  <rect x="110" y="10" width="180" height="44" rx="10" fill="#1a3a8f" stroke="#f5a623" stroke-width="4"/>
  <text x="200" y="40" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="white" text-anchor="middle" letter-spacing="1">MITCHELL'S</text>
  <text x="355" y="28" font-family="Arial, sans-serif" font-size="11" fill="#f5a623" text-anchor="middle">®</text>

  <!-- Heart outline — wider and taller -->
  <path d="M200 390 C200 390 40 290 40 165 C40 100 85 65 140 65 C168 65 190 82 200 95 C210 82 232 65 260 65 C315 65 360 100 360 165 C360 290 200 390 200 390Z"
    fill="none" stroke="#1a3a8f" stroke-width="5" stroke-linecap="round"/>

  <!-- "A" in gold italic -->
  <text x="148" y="148" font-family="Georgia, serif" font-size="52" font-style="italic" font-weight="700" fill="#f5a623" text-anchor="middle">A</text>

  <!-- "whole" in blue bold italic -->
  <text x="205" y="208" font-family="Georgia, serif" font-size="58" font-style="italic" font-weight="900" fill="#1a3a8f" text-anchor="middle">whole</text>

  <!-- "lot of" in gold italic smaller -->
  <text x="205" y="250" font-family="Georgia, serif" font-size="30" font-style="italic" font-weight="700" fill="#f5a623" text-anchor="middle">lot of</text>

  <!-- "Love!" in blue bold italic large -->
  <text x="205" y="318" font-family="Georgia, serif" font-size="52" font-style="italic" font-weight="900" fill="#1a3a8f" text-anchor="middle">Love!</text>
</svg>
